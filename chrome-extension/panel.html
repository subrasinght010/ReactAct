<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Assistant</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Job Assistant</h1>
      <p id="status" class="status"></p>
    </header>

    <section class="card">
      <h2>Job Create</h2>
      <div class="row">
        <label>API Base</label>
        <input id="apiBase" value="http://127.0.0.1:8000/api" />
      </div>
      <div class="row">
        <div>
          <label>Company</label>
          <input id="jobCompanyName" placeholder="Type new company" required />
        </div>
      </div>
      <div class="row three">
        <div><label>Job ID</label><input id="jobId" /></div>
        <div>
          <label>Role</label>
          <select id="jobRole" required>
            <option value="">Select role</option>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Fullstack Engineer">Fullstack Engineer</option>
            <option value="Backend Engineer">Backend Engineer</option>
            <option value="Sr. Software Engineer">Sr. Software Engineer</option>
          </select>
        </div>
        <div><label>Location</label><select id="jobLocation" required></select></div>
      </div>
      <div class="row two">
        <div>
          <label>Posted Date</label>
          <input id="postedDate" type="date" />
        </div>
        <div>
          <label>Applied</label>
          <select id="jobApplied">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
      </div>
      <div class="row"><label>Job Link</label><input id="jobLink" required /></div>
      <div class="row"><label>JD</label><textarea id="jdText" rows="5"></textarea></div>
      <p id="jobStatus" class="section-status"></p>
      <div class="actions">
        <button id="fetchFromPageBtn" type="button">Fetch From Page</button>
        <button id="saveJobBtn" type="button">Save Job</button>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="clearJobBtn" type="button">Clear Fields</button>
      </div>
    </section>

    <section class="card">
      <h2>Employee Create</h2>
      <div class="row two">
        <div><label>Name</label><input id="empName" required /></div>
        <div>
          <label>Department</label>
          <select id="empDepartment" required>
            <option value="">Select department</option>
            <option value="HR" selected>HR</option>
            <option value="Engineering">Engineering</option>
            <option value="Data">Data</option>
            <option value="Product">Product</option>
            <option value="Design">Design</option>
            <option value="Operations">Operations</option>
            <option value="Sales">Sales</option>
            <option value="Marketing">Marketing</option>
            <option value="Finance">Finance</option>
            <option value="Support">Support</option>
          </select>
        </div>
      </div>
      <div class="row two">
        <div><label>LinkedIn URL</label><input id="empLinkedin" required /></div>
        <div>
          <label>Role</label>
          <select id="empRole" required>
            <option value="">Select role</option>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Fullstack Engineer">Fullstack Engineer</option>
            <option value="Backend Engineer">Backend Engineer</option>
            <option value="Frontend Engineer">Frontend Engineer</option>
            <option value="Sr. Software Engineer">Sr. Software Engineer</option>
            <option value="Sr. Fullstack Engineer">Sr. Fullstack Engineer</option>
            <option value="Sr. Backend Engineer">Sr. Backend Engineer</option>
            <option value="Sr. Frontend Engineer">Sr. Frontend Engineer</option>
            <option value="Manager">Manager</option>
            <option value="Team Lead">Team Lead</option>
            <option value="HR Recruiter">HR Recruiter</option>
            <option value="Sr. HR Recruiter">Sr. HR Recruiter</option>
            <option value="Sr. Talent Acquisition Specialist">Sr. Talent Acquisition Specialist</option>
            <option value="General Talent Acquisition">General Talent Acquisition</option>
            <option value="Talent Acquisition Specialist">Talent Acquisition Specialist</option>
            <option value="Talent Sourcer">Talent Sourcer</option>
            <option value="Hiring Manager">Hiring Manager</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label>About</label>
        <textarea id="empAbout" rows="3" required></textarea>
      </div>
      <div class="row three">
        <div><label>First</label><input id="empFirst" /></div>
        <div><label>Middle</label><input id="empMiddle" /></div>
        <div><label>Last</label><input id="empLast" /></div>
      </div>
      <div class="row two">
        <div><label>Contact</label><input id="empContact" /></div>
        <div><label>Email</label><input id="empEmail" /></div>
      </div>
      <div class="row two">
        <div>
          <label>Company</label>
          <input id="empCompanyName" placeholder="Type new company" required />
        </div>
        <div>
          <label>Location</label>
          <select id="empLocation" required></select>
        </div>
      </div>
      <p id="employeeStatus" class="section-status"></p>
      <div class="actions">
        <button id="fetchEmployeeFromPageBtn" type="button">Fetch Employee</button>
        <button id="saveEmployeeBtn" type="button">Save Employee</button>
        <button id="refreshEmployeeBtn" type="button">Refresh</button>
        <button id="clearEmployeeBtn" type="button">Clear Fields</button>
      </div>
    </section>
  </main>
  <script src="panel.js"></script>
</body>
</html>
