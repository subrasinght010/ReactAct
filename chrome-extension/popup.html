<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Save Job</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">

    <section class="card">
      <label>API Base URL</label>
      <input id="apiBase" value="http://127.0.0.1:8000/api" />
    </section>

    <section class="card">
      <h2>Job Details</h2>

      <label>Company</label>
      <input id="companyName" />

      <label>Job Title</label>
      <input id="jobTitle" />

      <label>Job ID</label>
      <input id="jobId" />

      <label>Location</label>
      <input id="location" />

      <label>Posted Date</label>
      <input id="postedDate" />

      <label>Job URL</label>
      <input id="jobUrl" />

      <button id="fetchJdBtn">Fetch from Page</button>

      <label>Job Description</label>
      <textarea id="jdText"></textarea>

      <button id="saveJobBtn">Save Job</button>
    </section>

    <p id="status"></p>

  </main>

  <script src="popup.js"></script>
</body>
</html>
